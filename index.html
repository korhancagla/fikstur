<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Süper Lig Analytics | 2025-2026</title>
  <meta name="description" content="Türkiye Süper Ligi 2025-2026 sezonu haftalık maç fikstürleri ve skorlar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style_v10.css" />
</head>

<body>

  <header class="header"
    style="display: flex; justify-content: center; align-items: center; padding: 2rem 0; background: transparent; border-bottom: none;">
    <img src="logos/tff_logo.png" alt="Süper Lig Logo" style="width: auto; height: 60px;" />
  </header>

  <!-- Week Navigator -->
  <section class="week-nav-section">
    <div class="week-nav">
      <button class="nav-btn" id="btn-prev" aria-label="Önceki Hafta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="week-info" id="week-info">
        <span class="week-label" id="week-label">MATCHWEEK —</span>
        <span class="week-dates" id="week-dates">— / — / —</span>
      </div>
      <button class="nav-btn" id="btn-next" aria-label="Sonraki Hafta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </section>




  <!-- Main Content -->
  <main class="main-content" id="main-content">

    <!-- Loading -->
    <div class="loading-container" id="loading">
      <div class="loading-grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <p class="loading-text">FETCHING MATCH DATA...</p>
    </div>

    <!-- Error State -->
    <div class="error-container" id="error-container" style="display:none;">
      <div class="error-code">ERR_FETCH</div>
      <h2 class="error-title">Veriler Yüklenemedi</h2>
      <p class="error-msg" id="error-msg">Bağlantı hatası. Lütfen tekrar deneyin.</p>
      <button class="retry-btn" id="btn-retry">↻ RETRY</button>
    </div>

    <!-- Empty State -->
    <div class="empty-container" id="empty-container" style="display:none;">
      <div class="empty-code">NO_DATA</div>
      <h2 class="empty-title">Bu Haftada Maç Bulunamadı</h2>
      <p class="empty-msg">Başka bir haftayı seçin.</p>
    </div>

    <!-- Matches by Day -->
    <div class="days-container" id="days-container" style="display:none;"></div>
  </main>

  <!-- Puan Durumu Widget -->
  <section style="margin: 3rem auto; max-width: 600px; padding: 0 1rem;">
    <div id="widget-d8htmnvzb2i1" class="scoreaxis-widget"
      style="width: auto;height: auto;font-size: 12px;background-color: #ffffff;color: #444444;border: 1px solid;border-color: #aaaaaa;overflow: auto;">
      <script
        src="https://widgets.scoreaxis.com/api/football/league-table/62322bd0c7f2c13284422b22?widgetId=d8htmnvzb2i1&lang=tr&teamLogo=1&tableLines=0&homeAway=0&header=1&position=1&goals=0&gamesCount=1&diff=1&winCount=0&drawCount=0&loseCount=0&lastGames=1&points=1&teamsLimit=all&links=0&font=heebo&fontSize=12&rowDensity=100&widgetWidth=auto&widgetHeight=auto&bodyColor=%23ffffff&textColor=%23444444&linkColor=%23000000&borderColor=%23aaaaaa&tabColor=%23ffffff"
        async></script>
      <div class="widget-main-link" style="padding: 6px 12px;font-weight: 500;">Live data by <a
          href="https://www.scoreaxis.com/" style="color: inherit;">Scoreaxis</a></div>
    </div>
  </section>

  <footer class="footer">
    <span class="footer-line">— DATA SOURCE: TFF.ORG —</span>
  </footer>

  <script src="app_v10.js"></script>
</body>

</html>
